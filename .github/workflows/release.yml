name: Release

# Changesets-driven release. On push to main:
#  - if there are unreleased changesets, opens/updates a "Version Packages" PR
#  - when that PR is merged (versions already bumped), publishes to GitHub Packages
on:
  push:
    branches:
      - main

permissions:
  contents: write # create the version PR / tags
  pull-requests: write # open the version PR
  packages: write # publish to GitHub Packages

concurrency: release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node (GitHub Packages registry)
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: yarn
          registry-url: https://npm.pkg.github.com
          # Must match the scope in package.json.
          scope: '@emzo'

      - name: Install dependencies
        run: yarn install

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: yarn version-packages
          publish: yarn release
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
